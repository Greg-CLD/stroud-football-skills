name: Fetch latest FGR video

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'

permissions:
  contents: write

jobs:
  fetch-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse YouTube RSS feed
        run: |
          python3 << 'PYTHON_SCRIPT'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone

          RSS_URL = "https://www.youtube.com/feeds/videos.xml?channel_id=UC9hiO4pAzKontGqMaakP-Fw"

          # Title keywords for ranking videos (match highlights vs other content)
          BOOST_TERMS = [
              "match highlights", "extended highlights", "highlights",
              "highlight", "vs", "full-time", "full time"
          ]
          PENALTY_TERMS = [
              "interview", "training", "shorts", "press conference",
              "ticket", "behind the scenes", "preview", "reaction"
          ]

          def score_title(title):
              t = title.lower()
              score = 0
              for term in BOOST_TERMS:
                  if term in t:
                      score += 10
              for term in PENALTY_TERMS:
                  if term in t:
                      score -= 10
              return score

          def build_video(entry, ns):
              video_id = entry.find("yt:videoId", ns).text
              title = entry.find("atom:title", ns).text
              published = entry.find("atom:published", ns).text
              return {
                  "title": title,
                  "videoId": video_id,
                  "publishedAt": published,
                  "watchUrl": f"https://www.youtube.com/watch?v={video_id}",
                  "embedUrl": f"https://www.youtube-nocookie.com/embed/{video_id}",
                  "thumbnailUrl": f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg"
              }

          # Fetch the RSS feed
          req = urllib.request.Request(RSS_URL, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=30) as response:
              feed_xml = response.read().decode("utf-8")

          # Parse the XML
          root = ET.fromstring(feed_xml)

          # YouTube RSS uses Atom namespace
          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "yt": "http://www.youtube.com/xml/schemas/2015",
              "media": "http://search.yahoo.com/mrss/"
          }

          # Get the latest 5 entries
          entries = root.findall("atom:entry", ns)[:5]
          if not entries:
              print("No entries found in RSS feed")
              exit(1)

          videos = [build_video(e, ns) for e in entries]

          # Rank: highest score first, then most recent as tiebreaker
          videos.sort(key=lambda v: (score_title(v["title"]), v["publishedAt"]), reverse=True)

          data = {
              "featuredVideo": videos[0],
              "videos": videos,
              "fetchedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          # Write JSON file
          os.makedirs("data", exist_ok=True)
          with open("data/latest-fgr-video.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Featured: {videos[0]['title']} (score {score_title(videos[0]['title'])})")
          for v in videos:
              print(f"  [{score_title(v['title']):+d}] {v['title']}")
          PYTHON_SCRIPT

      - name: Commit and push if changed
        run: |
          git diff --quiet data/latest-fgr-video.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-fgr-video.json
          git commit -m "chore: update FGR featured video"
          git push
